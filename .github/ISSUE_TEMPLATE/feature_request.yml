name: Feature request
description: Suggest a gha-bom improvement
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow review or risk mapping problem would this improve?
    validations:
      required: true
  - type: textarea
    id: example_workflow
    attributes:
      label: Example workflow
      description: Paste a minimal workflow or step shape if possible.
      render: yaml
    validations:
      required: false
  - type: textarea
    id: expected_output
    attributes:
      label: Expected finding or report output
      description: What should gha-bom show?
    validations:
      required: true
  - type: dropdown
    id: risk_score
    attributes:
      label: Should this affect risk score?
      options:
        - "No, inventory/reporting only"
        - "Yes, low severity"
        - "Yes, medium severity"
        - "Yes, high severity"
        - "Not sure"
    validations:
      required: true
