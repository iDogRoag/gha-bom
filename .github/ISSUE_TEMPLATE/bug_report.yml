name: Bug report
description: Report a problem with gha-bom
title: "Bug: "
labels:
  - bug
body:
  - type: input
    id: gha_bom_version
    attributes:
      label: gha-bom version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node version
      placeholder: "v24.16.0"
    validations:
      required: true
  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: command_run
    attributes:
      label: Command run
      render: shell
      placeholder: "gha-bom scan . --format json"
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: minimal_workflow_yaml
    attributes:
      label: Minimal workflow YAML
      description: Paste the smallest workflow that reproduces the issue. Redact secret values.
      render: yaml
    validations:
      required: false
